name: sinoma
description: Sinoma — Learn Mandarin through real video clips, AI dictionary, and games.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Backend — Supabase (Auth + Database + Storage + Realtime)
  supabase_flutter: ^2.5.0

  # Video
  youtube_player_iframe: ^4.0.3
  video_player: ^2.9.1
  chewie: ^1.8.3

  # AI
  google_generative_ai: ^0.4.6

  # Local Cache
  hive_flutter: ^1.1.0

  # Navigation
  go_router: ^14.2.7

  # Utilities
  cached_network_image: ^3.4.1
  crypto: ^3.0.5
  intl: ^0.20.2
  connectivity_plus: ^6.0.3
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.0
  http: ^1.2.0
  image_picker: ^1.1.2
  web: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

# Patches youtube_player_iframe_web to use dart:ui_web (platformViewRegistry
# moved from dart:ui in Flutter 3.19+). Remove when pub.dev package is updated.
dependency_overrides:
  youtube_player_iframe_web:
    path: packages/youtube_player_iframe_web

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/data/
