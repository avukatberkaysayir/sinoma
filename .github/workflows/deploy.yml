name: Deploy to Vercel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: flutter build web --release

      - name: Patch service worker (nuke all caches before unregister)
        run: |
          cat > build/web/flutter_service_worker.js << 'SWEOF'
          'use strict';
          self.addEventListener('install', () => { self.skipWaiting(); });
          self.addEventListener('activate', (event) => {
            event.waitUntil((async () => {
              try {
                const cacheKeys = await caches.keys();
                await Promise.all(cacheKeys.map(k => caches.delete(k)));
              } catch (e) {}
              try {
                await self.registration.unregister();
              } catch (e) {}
              try {
                const clients = await self.clients.matchAll({ type: 'window' });
                clients.forEach((c) => {
                  if (c.url && 'navigate' in c) c.navigate(c.url);
                });
              } catch (e) {}
            })());
          });
          SWEOF

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: team_tdAkFPOl6Dv0iA9KxAzdgTHW
          vercel-project-id: prj_PXfJmVfy2PploC8BVkL3PFdcB6xj
          working-directory: ./build/web
          vercel-args: '--prod'
