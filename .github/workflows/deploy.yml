name: Deploy to Vercel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: flutter build web --release

      - name: Replace service worker (nuke caches before unregister)
        run: cp web/sw_nuke.js build/web/flutter_service_worker.js

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: team_tdAkFPOl6Dv0iA9KxAzdgTHW
          vercel-project-id: prj_PXfJmVfy2PploC8BVkL3PFdcB6xj
          working-directory: ./build/web
          vercel-args: '--prod'
