<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Sinoma — Learn Mandarin through real video clips, AI explanations, and games.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Sinoma">
  <meta name="theme-color" content="#121212">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Sinoma</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icons/Icon-192.png">

  <style>
    body {
      margin: 0;
      background-color: #121212;
    }
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #121212;
      flex-direction: column;
      gap: 16px;
    }
    #loading svg {
      animation: spin 1.2s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
      <circle cx="24" cy="24" r="20" stroke="#E63946" stroke-width="4" stroke-linecap="round"
        stroke-dasharray="80 40" />
    </svg>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', () => {
      const el = document.getElementById('loading');
      if (el) el.remove();
    });
  </script>

  <!-- Unregister any stale service worker from previous deploys -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        regs.forEach(function (r) { r.unregister(); });
      });
    }
  </script>

  <!-- Vercel Analytics — page views + custom events (Pro plan) -->
  <script defer src="/_vercel/insights/script.js"></script>

  <!-- YouGlish embed API — used by the video player screen -->
  <script async src="https://youglish.com/public/emb/widget.js" charset="utf-8"></script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
