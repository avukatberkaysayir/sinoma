<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Sinoma — Learn Mandarin through real video clips, AI explanations, and games.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Sinoma">
  <meta name="theme-color" content="#121212">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Sinoma</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icons/Icon-192.png">

  <!-- Firebase SDK (compat version for service worker compatibility) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging-compat.js"></script>

  <style>
    body {
      margin: 0;
      background-color: #121212;
    }
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #121212;
      flex-direction: column;
      gap: 16px;
    }
    #loading svg {
      animation: spin 1.2s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
      <circle cx="24" cy="24" r="20" stroke="#E63946" stroke-width="4" stroke-linecap="round"
        stroke-dasharray="80 40" />
    </svg>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', () => {
      const el = document.getElementById('loading');
      if (el) el.remove();
    });
  </script>

  <!-- SW update enforcement: always check for new version on load, reload when new SW activates -->
  <script>
    (function () {
      if (!('serviceWorker' in navigator)) return;

      // Track whether a SW was already controlling this page BEFORE this load.
      // If hadController=false, this is a first-install — don't reload (content
      // was already fetched fresh from the network).
      var hadController = !!navigator.serviceWorker.controller;
      var refreshing = false;

      navigator.serviceWorker.addEventListener('controllerchange', function () {
        if (refreshing || !hadController) return;
        refreshing = true;
        window.location.reload();
      });

      function activateWaiting(reg) {
        if (!reg.waiting) return;
        // Flutter's SW listens for this message to call skipWaiting()
        reg.waiting.postMessage({ type: 'SKIP_WAITING' });
      }

      navigator.serviceWorker.ready.then(function (reg) {
        activateWaiting(reg);
        // Check for a new SW version immediately on every page load.
        // The browser always fetches flutter_service_worker.js from network
        // (spec: SW scripts bypass the SW cache), so this detects new deploys
        // within seconds — not after the 60-second interval.
        reg.update().catch(function () { /* offline — silent fail */ });

        reg.addEventListener('updatefound', function () {
          var sw = reg.installing;
          if (!sw) return;
          sw.addEventListener('statechange', function () {
            if (sw.state === 'installed') activateWaiting(sw);
          });
        });
      });
    })();
  </script>

  <!-- YouGlish embed API — used by the video player screen -->
  <script async src="https://youglish.com/public/emb/widget.js" charset="utf-8"></script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
