<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Sinoma — Learn Mandarin through real video clips, AI explanations, and games.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Sinoma">
  <meta name="theme-color" content="#121212">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Sinoma</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icons/Icon-192.png">

  <style>
    body {
      margin: 0;
      background-color: #121212;
    }
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #121212;
      flex-direction: column;
      gap: 16px;
    }
    #loading svg {
      animation: spin 1.2s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
      <circle cx="24" cy="24" r="20" stroke="#E63946" stroke-width="4" stroke-linecap="round"
        stroke-dasharray="80 40" />
    </svg>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', () => {
      const el = document.getElementById('loading');
      if (el) el.remove();
    });
  </script>

  <!-- SW update enforcement: detect new deploy → skipWaiting → auto-reload once -->
  <script>
    (function () {
      if (!('serviceWorker' in navigator)) return;

      // hadController=false means first install — no reload needed (files already fresh).
      var hadController = !!navigator.serviceWorker.controller;
      var refreshing = false;

      // When the new SW takes control, reload once to serve fresh assets.
      navigator.serviceWorker.addEventListener('controllerchange', function () {
        if (refreshing || !hadController) return;
        refreshing = true;
        window.location.reload();
      });

      // Flutter's generated SW expects the plain string 'SKIP_WAITING' (not an object).
      function skipWaiting(reg) {
        if (reg.waiting) reg.waiting.postMessage('SKIP_WAITING');
      }

      navigator.serviceWorker.ready.then(function (reg) {
        // Handle a SW already waiting from a previous update check.
        skipWaiting(reg);

        // Force-fetch flutter_service_worker.js on every load (SW scripts bypass
        // the HTTP cache per spec), so new deploys are detected within seconds.
        reg.update().catch(function () {});

        reg.addEventListener('updatefound', function () {
          var sw = reg.installing;
          if (!sw) return;
          sw.addEventListener('statechange', function () {
            // 'installed' = download complete, now waiting to activate.
            // Pass `reg` (the registration), not `sw` (the worker), because
            // skipWaiting checks reg.waiting — ServiceWorker instances have no .waiting.
            if (sw.state === 'installed') skipWaiting(reg);
          });
        });
      });
    })();
  </script>

  <!-- Vercel Analytics — page views + custom events (Pro plan) -->
  <script defer src="/_vercel/insights/script.js"></script>

  <!-- YouGlish embed API — used by the video player screen -->
  <script async src="https://youglish.com/public/emb/widget.js" charset="utf-8"></script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
